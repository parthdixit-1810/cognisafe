# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/cognisafe}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQL8Dialect}

# JWT (set JWT_SECRET in production — min 32 characters)
jwt.secret=${JWT_SECRET:cognisafe-dev-secret-change-in-production-min-32-chars}
jwt.expiry-hours=${JWT_EXPIRY_HOURS:168}

# Vault AES-256 key (Base64-encoded 32 bytes). Falls back to derived key from JWT secret in dev.
vault.encryption-key-base64=${VAULT_ENCRYPTION_KEY:}

# Email (optional — OTP prints to console when unset)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.com.example.passwordvault=INFO
